<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wachtwoord generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body class="text-center">
    <div class="card border-black text-center" style="margin-top:25px; align-items:center">
       <h1>Wachtwoord generator</h1>
        <p>Genereer makkelijk en snel sterke wachtwoorden!</p>
          <label>
            <input type="checkbox" id="letters"> Letters
          </label> <br>
           <label>
            <input type="checkbox" id="numbers"> Cijfers
           </label> <br>
           <label>
            <input type="checkbox" id="characters"> Leestekens
            </label> <br>
            <label>
            <input type="number" id="passLength" min="1" value="21" oninput="updateLength()" class="w-25"> Lengte van het wachtwoord
            </label> <br>
            <button onclick="generate(letterToggle, numberToggle, charToggle)" class="mb-1 btn btn-outline-primary">Genereer</button>
        </div> <br>
        <p class="visually-hidden pass-stuff">Uw wachtwoord is:</p>
        <input readonly type="password" id="passwordinput" class="visually-hidden pass-stuff">
        <button class="visually-hidden pass-stuff btn btn-outline-dark" id="showbutton" onclick="toggleVisibility()"><i class="bi bi-eye"></i></button>
        <button class="visually-hidden pass-stuff btn btn-outline-warning" onclick="copyPass()"><i class="bi bi-clipboard"></i></button>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
